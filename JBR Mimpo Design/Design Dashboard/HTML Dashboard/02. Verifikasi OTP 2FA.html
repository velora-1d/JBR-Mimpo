<!DOCTYPE html>

<html class="dark" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JBR Minpo Command - Verifikasi 2FA</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@400;700&amp;family=Plus+Jakarta+Sans:wght@400;700&amp;family=Inter:wght@400;500&amp;family=Space+Grotesk:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "background": "#070e1d",
                    "tertiary-container": "#00dcfd",
                    "tertiary-fixed": "#00dcfd",
                    "primary-fixed": "#69f6b8",
                    "secondary-dim": "#47edc4",
                    "on-secondary-container": "#defff2",
                    "tertiary": "#77e6ff",
                    "inverse-surface": "#f9f9ff",
                    "error": "#ff716c",
                    "primary-fixed-dim": "#58e7ab",
                    "on-background": "#dfe5fa",
                    "on-tertiary-fixed-variant": "#005360",
                    "tertiary-fixed-dim": "#00cdeb",
                    "on-secondary": "#005d4a",
                    "secondary": "#5afcd2",
                    "outline": "#6e7588",
                    "on-tertiary-fixed": "#00343c",
                    "tertiary-dim": "#00cdeb",
                    "surface-bright": "#212c43",
                    "surface": "#070e1d",
                    "error-container": "#9f0519",
                    "on-secondary-fixed-variant": "#006853",
                    "on-surface-variant": "#a4abbf",
                    "inverse-on-surface": "#4e5566",
                    "surface-container-high": "#161f33",
                    "on-primary-fixed-variant": "#006544",
                    "on-primary-container": "#002919",
                    "primary-dim": "#58e7ab",
                    "inverse-primary": "#006d4a",
                    "surface-container-highest": "#1b263b",
                    "surface-tint": "#69f6b8",
                    "surface-container": "#11192b",
                    "on-tertiary": "#005360",
                    "surface-dim": "#070e1d",
                    "secondary-fixed": "#5afcd2",
                    "error-dim": "#d7383b",
                    "on-primary": "#005a3c",
                    "on-error": "#490006",
                    "on-error-container": "#ffa8a3",
                    "secondary-container": "#006b56",
                    "on-tertiary-container": "#004955",
                    "surface-container-low": "#0b1323",
                    "primary": "#69f6b8",
                    "on-secondary-fixed": "#004939",
                    "on-surface": "#dfe5fa",
                    "outline-variant": "#414859",
                    "on-primary-fixed": "#00452d",
                    "surface-container-lowest": "#000000",
                    "primary-container": "#06b77f",
                    "secondary-fixed-dim": "#47edc4"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Sora", "Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Space Grotesk"],
                    "mono": ["JetBrains Mono"]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #070e1d; /* Overriding with Design System Surface */
            background-image: 
                radial-gradient(at 0% 0%, rgba(105, 246, 184, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(119, 230, 255, 0.05) 0px, transparent 50%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .otp-input:focus {
            box-shadow: 0 0 15px rgba(105, 246, 184, 0.3);
        }
        .glass-card {
            backdrop-filter: blur(20px);
            background: rgba(17, 25, 43, 0.6);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 antialiased selection:bg-primary selection:text-on-primary">
<div class="w-full max-w-[480px] flex flex-col items-center">
<!-- Brand Logo Anchor -->
<div class="mb-10 text-center">
<h1 class="font-headline text-2xl font-extrabold tracking-tighter text-primary">JBR Minpo</h1>
<p class="font-mono text-[10px] uppercase tracking-widest text-outline mt-1">Emerald Sentinel Security</p>
</div>
<!-- Main Verification Card -->
<main class="glass-card w-full rounded-[32px] p-10 flex flex-col items-center relative overflow-hidden tonal-transition">
<!-- Atmospheric Glow Background -->
<div class="absolute -top-24 -left-24 w-48 h-48 bg-primary/10 rounded-full blur-3xl"></div>
<!-- Illustration Header -->
<div class="relative mb-8 flex justify-center">
<div class="w-32 h-32 relative flex items-center justify-center">
<!-- Messaging Box Illustration Mockup -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/20 to-secondary/10 rounded-3xl transform rotate-6 scale-90 opacity-40 blur-sm"></div>
<div class="w-24 h-24 bg-surface-container-high rounded-2xl flex items-center justify-center shadow-xl border border-outline-variant/20 relative z-10">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
</div>
<!-- Floating Digital Lock -->
<div class="absolute -top-2 -right-2 w-12 h-12 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/20 z-20 transform -rotate-12">
<span class="material-symbols-outlined text-on-primary text-2xl" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<!-- Floating Data Particle -->
<div class="absolute bottom-4 -left-4 w-6 h-6 bg-tertiary rounded-full flex items-center justify-center shadow-lg z-20">
<span class="material-symbols-outlined text-surface text-xs" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
</div>
</div>
<!-- Title & Instruction -->
<div class="text-center space-y-2 mb-10">
<h2 class="font-headline text-3xl font-bold tracking-tight text-on-surface">Verifikasi Keamanan</h2>
<p class="font-body text-on-surface-variant text-sm">Masukkan 6 digit kode dari WhatsApp Anda</p>
</div>
<!-- OTP Input Grid -->
<div class="grid grid-cols-6 gap-3 mb-10 w-full">
<!-- Inputs use JetBrains Mono as per request -->
<input class="otp-input w-full h-16 rounded-xl bg-surface-container-highest border-none text-center font-mono text-2xl font-bold text-primary focus:ring-2 focus:ring-primary transition-all duration-300" maxlength="1" placeholder="•" type="text" value="4"/>
<input class="otp-input w-full h-16 rounded-xl bg-surface-container-highest border-none text-center font-mono text-2xl font-bold text-primary focus:ring-2 focus:ring-primary transition-all duration-300" maxlength="1" placeholder="•" type="text" value="8"/>
<input class="otp-input w-full h-16 rounded-xl bg-surface-container-highest border-none text-center font-mono text-2xl font-bold text-primary focus:ring-2 focus:ring-primary transition-all duration-300" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-full h-16 rounded-xl bg-surface-container-highest border-none text-center font-mono text-2xl font-bold text-primary focus:ring-2 focus:ring-primary transition-all duration-300" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-full h-16 rounded-xl bg-surface-container-highest border-none text-center font-mono text-2xl font-bold text-primary focus:ring-2 focus:ring-primary transition-all duration-300" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-full h-16 rounded-xl bg-surface-container-highest border-none text-center font-mono text-2xl font-bold text-primary focus:ring-2 focus:ring-primary transition-all duration-300" maxlength="1" placeholder="•" type="text"/>
</div>
<!-- Timer & Actions -->
<div class="w-full flex flex-col items-center gap-6 mb-8">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-outline text-sm">schedule</span>
<span class="font-mono text-sm font-bold text-on-surface-variant">00:45</span>
</div>
<!-- Secondary Action (Resend) - Hidden by default or styled as secondary -->
<button class="font-headline text-xs font-semibold uppercase tracking-wider text-outline hover:text-primary transition-colors duration-200">
                    Kirim Ulang Kode
                </button>
</div>
<!-- Primary CTA -->
<button class="w-full h-14 rounded-xl bg-primary text-on-primary font-headline font-bold text-sm uppercase tracking-widest shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
                Verifikasi &amp; Masuk
                <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<!-- Security Footer -->
<div class="mt-10 flex items-center gap-2 px-4 py-3 rounded-full bg-surface-container-low/50 border border-outline-variant/10">
<span class="material-symbols-outlined text-tertiary text-[14px]">info</span>
<p class="font-mono text-[10px] text-on-surface-variant leading-none">Sesi ini akan dicatat otomatis di Activity Log</p>
</div>
</main>
<!-- Accessibility Helper -->
<div class="mt-8 text-center space-y-4">
<p class="font-body text-xs text-outline">Punya kendala? <a class="text-tertiary hover:underline" href="#">Hubungi Network Node Support</a></p>
<div class="flex justify-center items-center gap-4 text-outline-variant">
<span class="material-symbols-outlined text-lg">shield_lock</span>
<span class="material-symbols-outlined text-lg">verified_user</span>
<span class="material-symbols-outlined text-lg">vpn_key</span>
</div>
</div>
</div>
</body></html>
