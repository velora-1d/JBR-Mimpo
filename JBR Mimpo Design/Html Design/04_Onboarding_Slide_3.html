</div>
<div class="absolute bottom-32 left-[10%] glass-effect p-2 rounded-xl rotate-[8deg]">

</div>

<div class="space-y-4 max-w-sm">
<h1 class="text-3xl font-bold font-headline tracking-tight text-on-background leading-tight">
                CS Online 24 Jam
            </h1>
<p class="text-on-surface-variant text-base leading-relaxed">
                Bantuan teknis kapan saja, solusi cepat langsung dari genggaman
