<body class="bg-surface font-body text-on-surface selection:bg-primary-container/30">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center px-6 h-16 bg-[#faf8ff]/80 dark:bg-slate-900/80 backdrop-blur-xl">
<div class="flex items-center gap-4">
<button class="p-2 -ml-2 rounded-full hover:bg-emerald-50/50 dark:hover:bg-emerald-900/20 transition-colors active:scale-95 duration-200 ease-out" style="">
<span class="material-symbols-outlined text-emerald-600 dark:text-emerald-400" style="">arrow_back</span>
</button>
<h1 class="text-lg font-bold text-emerald-600 dark:text-emerald-400 font-headline" style="">Lupa Kata Sandi</h1>
</div>
</header>
<main class="min-h-screen pt-24 pb-12 px-6 flex flex-col max-w-md mx-auto">
<!-- Visual: 3D Glossy Icon Area -->
<div class="flex justify-center mb-10 relative">
<div class="absolute inset-0 bg-primary-container/10 blur-[60px] rounded-full scale-75"></div>
<div class="relative w-48 h-48 flex items-center justify-center">
<img alt="Silver key floating in air" class="w-40 h-40 object-contain drop-shadow-2xl z-10" data-alt="3D rendered silver metallic key floating in mid-air with soft emerald sparkles and ethereal green glow on a white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDAXTXpenjtewDE8ZWeMmIZvG_tFwYGmeqG1sVs0jpzBnQZnuLpqib3fmINtU_hhk9R-gqNneFjm0Kfc21FvLVU5yPoEXEmGvE5E6iC47CdUP95F6WaoUCcxx8ahdjJOxgUW8hOWNruGdTf7vrSraQxWFgk6Q1VdzYqvsuowHmt-hY4vQOCodIEXq5UrQt6V0KFrShVQAvcHcsOyG1r737734vhH_3f3n0Eu-Wo1BiZECfpTHUh-4XD5NLs0TPY6A_pBfR22k6fG36l" style="">
<!-- Sparkle elements via CSS -->
<div class="absolute top-4 right-8 w-3 h-3 bg-primary-container rounded-full animate-pulse blur-[1px]"></div>
<div class="absolute bottom-8 left-10 w-2 h-2 bg-secondary-fixed rounded-full animate-pulse blur-[1px]" style="animation-delay: 1s"></div>
</div>
</div>
<!-- Text Header -->
<div class="space-y-3 mb-10">
<h2 class="text-3xl font-bold font-headline text-on-surface tracking-tight leading-tight" style="">Atur Ulang Sandi</h2>
<p class="text-on-surface-variant leading-relaxed" style="">Masukkan nomor WhatsApp yang terdaftar untuk link reset</p>
</div>
<!-- Input Section -->
<div class="space-y-8 flex-grow">
<div class="group">
<label class="block text-sm font-bold font-headline text-on-surface-variant mb-3 ml-1" for="whatsapp" style="">Nomor WhatsApp</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: &quot;FILL&quot; 1;">phone_iphone</span>
</div>
<input class="block w-full h-16 pl-12 pr-4 bg-surface-container-low border-none rounded-xl font-label text-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-tertiary/20 focus:bg-surface-container-lowest transition-all" id="whatsapp" name="whatsapp" placeholder="0812xxxx" type="tel">
</div>
<p class="mt-3 text-xs text-outline font-medium flex items-center gap-1.5 ml-1" style="">
<span class="material-symbols-outlined text-[14px]" style="">info</span>
                    Contoh: 081234567890
                </p>
</div>
</div>
<!-- Action Button -->
<div class="mt-auto pt-8">
<button class="w-full h-14 bg-primary-container text-on-primary-container font-headline font-bold rounded-xl shadow-[0_8px_20px_-6px_rgba(16,185,129,0.4)] active:scale-95 transition-all duration-200 flex items-center justify-center gap-2" style="">
                Kirim Instruksi
                <span class="material-symbols-outlined text-[20px]" style="">send</span>
</button>
<p class="text-center mt-6 text-sm text-on-surface-variant" style="">
                Butuh bantuan lain? <a class="text-primary font-bold hover:underline" href="#" style="">Hubungi CS</a>
</p>
</div>
</main>
<!-- Navigation suppressed per rules for transactional screen (Login/Recovery) -->
<!-- But keeping structure ready if needed for sub-navigation logic -->
<!-- Footer Branding (Minimal) -->
<footer class="pb-10 text-center">
<div class="inline-flex items-center gap-1.5 px-3 py-1 bg-surface-container-low rounded-full">
<div class="w-1.5 h-1.5 bg-primary rounded-full"></div>
<span class="font-label text-[10px] tracking-widest text-outline uppercase" style="">SEMOGA HARIMU MENYENANGKAN..</span>
