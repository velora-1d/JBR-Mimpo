<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EtherNet Onboarding - Network Precision</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

              "surface-container": "#eaedff",
              "outline-variant": "#bbcabf",

              "surface-container-low": "#f2f3ff",
              "tertiary": "#005ac2",
              "secondary-fixed-dim": "#68dba9",
              "on-primary": "#ffffff",

              "on-secondary-fixed": "#002114",
              "surface-variant": "#dae2fd",
              "on-tertiary-fixed-variant": "#004395"

            fontFamily: {
              "headline": ["Sora", "Plus Jakarta Sans"],
              "body": ["DM Sans", "Manrope"],
              "label": ["JetBrains Mono", "Space Grotesk"]

            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        background: rgba(218, 226, 253, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(111, 251, 190, 0.3);
      }
      .claymorphic-sink:active {
        transform: scale(0.98);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-background selection:bg-secondary-container">
<!-- Top AppBar (Simplified for Onboarding) -->
<header class="fixed top-0 w-full z-50 flex justify-end items-center px-6 py-8">
<button class="text-slate-500 font-medium hover:text-primary transition-colors duration-200">
            Skip
        </button>
</header>
<main class="min-h-screen flex flex-col">
<!-- Upper Section: Hero Visual -->
<section class="relative flex-1 flex items-center justify-center overflow-hidden bg-gradient-to-b from-surface-container-high to-background">
<!-- 3D Network Wave Rings & Particles -->
<div class="absolute inset-0 z-0">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] opacity-20">
<div class="absolute inset-0 rounded-full border-[1.5px] border-emerald-400/30 animate-ping" style="animation-duration: 4s;"></div>
<div class="absolute inset-10 rounded-full border-[1.5px] border-emerald-500/20"></div>
<div class="absolute inset-24 rounded-full border-[1.5px] border-emerald-600/10"></div>
</div>
<!-- Energy Particles (Simulated via Gradient Blobs) -->
<div class="absolute top-20 right-10 w-32 h-32 bg-primary-container/20 rounded-full blur-3xl"></div>
<div class="absolute bottom-20 left-10 w-48 h-48 bg-tertiary-container/10 rounded-full blur-3xl"></div>
</div>
<!-- Mascot & Router Visual -->
<div class="relative z-10 w-full max-w-md px-8 pt-12">
<img class="w-full h-auto drop-shadow-[0_20px_50px_rgba(0,108,73,0.15)]" data-alt="3D friendly robot mascot pointing at emerald LED strips on a sleek Wi-Fi 6 router, futuristic lab setting, soft focus network waves" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB9eHUmBwJfa5Pxr_C4980Oytp_3dimWnvsKrUdCFJMRGKPq8Km3G5iPSZBuf8eHCiVJQfcR9E3FvdimmUAEEMpCm_97I1Igih1gwqO4UUsPcy3CJY8a7MDtleEYeEE5VfkLPITYuuV3G0SB9mPxX6hKX3tnpIizAuzCt2HskdrEaW7G55hZXJ0dDHwENW-pi2CDRGWS_Ucw0cAUSLIBFaNuFH9woHoxWsCvWAnLC09zcKJ3JvmNWDcF7XAkm5gkB-JT3P4CmX5T4sB"/>
</div>
</section>
<!-- Content Area -->
<section class="bg-surface-container-lowest rounded-t-[2.5rem] px-8 pt-10 pb-12 flex flex-col items-center gap-8 shadow-[0_-10px_40px_rgba(0,0,0,0.03)]">
<!-- Typography -->
<div class="text-center space-y-3">
<h1 class="font-headline text-3xl font-bold tracking-tight text-on-background">
                    Info Gangguan Real-Time
                </h1>
<p class="text-on-surface-variant leading-relaxed max-w-[280px] mx-auto">
                    Pantau status jaringan di area kamu secara akurat
                </p>
</div>
<!-- Pagination Dots -->
<div class="flex items-center gap-2">
<div class="h-2 w-8 bg-primary rounded-full transition-all duration-300"></div>
<div class="h-2 w-2 bg-outline-variant rounded-full"></div>
<div class="h-2 w-2 bg-outline-variant rounded-full"></div>
</div>
<!-- Primary Action -->
<div class="w-full pt-4">
<button class="w-full bg-primary text-on-primary font-bold py-4 rounded-xl shadow-[0_8px_20px_rgba(0,108,73,0.2)] hover:shadow-[0_12px_24px_rgba(0,108,73,0.3)] claymorphic-sink transition-all duration-200">
                    Lanjut
                </button>
</div>
<!-- Technical Detail (Ghost Hint) -->
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container-low rounded-full">
<span class="material-symbols-outlined text-[14px] text-primary" data-icon="security">security</span>
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">
                    Precision Protocol v6.2
                </span>
</div>
</section>
</main>
<!-- Invisible Bottom Shell (Suppressing global nav for onboarding) -->
<div class="sr-only">Onboarding Flow Active - Navigation Hidden</div>
</body></html>
