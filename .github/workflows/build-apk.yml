name: Build APK

on:
  push:
    branches:
      - main
      - master
      - dev
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0' # Menggunakan versi stabil terbaru
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: Minpo_mobile
        run: flutter pub get

      - name: Build APK & AppBundle
        working-directory: Minpo_mobile
        run: |
          flutter build apk --split-per-abi
          flutter build appbundle

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            Minpo_mobile/build/app/outputs/flutter-apk/*.apk
            Minpo_mobile/build/app/outputs/bundle/release/*.aab
