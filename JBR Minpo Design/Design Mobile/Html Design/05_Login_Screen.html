<!DOCTYPE html><html lang="id"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>NetVantage - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&amp;family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&amp;family=JetBrains+Mono:wght@400;500&amp;family=Plus+Jakarta+Sans:wght@700&amp;family=Manrope:wght@400;500;600&amp;family=Space+Grotesk:wght@500&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary": "#006c4a",
              "on-primary": "#ffffff",
              "secondary-fixed-dim": "#68dba9",
              "on-surface-variant": "#3c4a42",
              "surface-container-low": "#f2f3ff",
              "secondary-container": "#82f5c1",
              "primary": "#006c49",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-fixed-variant": "#004395",
              "error-container": "#ffdad6",
              "surface": "#faf8ff",
              "on-secondary-container": "#00714e",
              "on-error": "#ffffff",
              "on-secondary-fixed": "#002114",
              "on-secondary-fixed-variant": "#005137",
              "on-background": "#131b2e",
              "outline-variant": "#bbcabf",
              "on-error-container": "#93000a",
              "inverse-surface": "#283044",
              "primary-container": "#10b981",
              "tertiary-fixed-dim": "#adc6ff",
              "primary-fixed": "#6ffbbe",
              "on-tertiary-fixed": "#001a42",
              "tertiary": "#005ac2",
              "surface-container-highest": "#dae2fd",
              "on-tertiary-container": "#00367a",
              "on-surface": "#131b2e",
              "error": "#ba1a1a",
              "surface-variant": "#dae2fd",
              "on-secondary": "#ffffff",
              "secondary-fixed": "#85f8c4",
              "inverse-primary": "#4edea3",
              "outline": "#6c7a71",
              "surface-container": "#eaedff"
            },
            fontFamily: {
              "headline": ["Sora", "Plus Jakarta Sans", "sans-serif"],
              "body": ["DM Sans", "Manrope", "sans-serif"],
              "label": ["JetBrains Mono", "Space Grotesk", "monospace"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .inner-glow {
        box-shadow: inset 0 1px 0 0 rgba(111, 251, 190, 0.3);
      }
      input:focus {
        outline: none;
        box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
<!-- Decorative Ethereal Elements -->
<div class="absolute top-[-10%] left-[-10%] w-72 h-72 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-tertiary/10 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Login Container -->
<main class="w-full max-w-md z-10">
<!-- Brand & Greeting Section -->
<header class="flex flex-col items-center mb-10">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="security" style="">security</span>
<span class="text-xl font-bold tracking-tight text-primary font-headline" style="">JBR MINPO</span>
</div>
<h1 class="font-headline text-2xl font-bold text-on-background tracking-tight" style="">Selamat Datang Kembali</h1>
<p class="text-on-surface-variant mt-2 text-center" style="">Lihat Informasi Realtime &amp; Kumplulkan Reward</p>
</header>
<!-- Form Card -->
<div class="glass-card rounded-3xl p-8 shadow-[0_20px_50px_rgba(0,0,0,0.04)] border border-white/40">
<form action="#" class="space-y-6" method="POST">
<!-- WhatsApp Number Input -->
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface ml-1" for="whatsapp" style="">Nomor WhatsApp Wajib Di Isi</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="chat" style="">chat</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-slate-100/50 border-0 rounded-2xl font-label text-base transition-all focus:bg-white focus:ring-2 focus:ring-primary-container" id="whatsapp" name="whatsapp" placeholder="812xxxx" required="" type="tel">
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-sm font-medium text-on-surface" for="password" style="">Kata Sandi</label>
<a class="text-sm font-semibold text-primary hover:text-primary-container transition-colors" href="#" style="">Lupa Sandi?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="lock" style="">lock</span>
</div>
<input class="block w-full pl-11 pr-12 py-4 bg-slate-100/50 border-0 rounded-2xl font-label text-base transition-all focus:bg-white focus:ring-2 focus:ring-primary-container" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface transition-colors" type="button" style="">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility" style="">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-4 bg-gradient-to-br from-primary-container to-primary text-white font-headline font-bold rounded-2xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] inner-glow" type="submit" style="">
                    Masuk
                </button>
</form>
<!-- Social/Alt Login Separation -->
<div class="mt-8 flex items-center gap-4">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="text-xs font-label text-outline uppercase tracking-wider" style="">Keamanan Terjamin</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Support/Security Badge -->
<div class="mt-8 flex justify-center items-center gap-6">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-lg" data-icon="verified_user" style="">verified_user</span>
<span class="text-[11px] font-medium text-on-surface-variant font-label" style="">SSL Encrypted</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-lg" data-icon="support_agent" style="">support_agent</span>
<span class="text-[11px] font-medium text-on-surface-variant font-label" style="">Bantuan 24/7</span>
</div>
</div>
</div>
<!-- Footer Action -->
<footer class="mt-10 text-center">
<p class="text-on-surface-variant" style="">
                Belum punya akun? 
                <a class="font-bold text-primary ml-1 hover:underline underline-offset-4 decoration-2" href="#" style="">Daftar</a>
</p>
</footer>
</main>
<!-- Empty Navigation Suppressed per "The Destination Rule" - Login screen is a focused entry point -->
</body></html>
