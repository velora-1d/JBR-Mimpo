<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registrasi - JBR Minpo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&amp;family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#10b981",
                        "on-primary": "#ffffff",
                        "surface-tint": "#006c49",
                        "secondary": "#006c4a",
                        "on-surface-variant": "#3c4a42",
                        "inverse-surface": "#283044",
                        "on-primary-fixed-variant": "#005236",
                        "inverse-primary": "#4edea3",
                        "on-surface": "#131b2e",
                        "secondary-container": "#82f5c1",
                        "outline-variant": "#bbcabf",
                        "on-error-container": "#93000a",
                        "surface": "#faf8ff",
                        "on-tertiary-fixed": "#001a42",
                        "surface-container": "#eaedff",
                        "tertiary": "#005ac2",
                        "primary-fixed-dim": "#4edea3",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed": "#002114",
                        "on-primary-container": "#00422b",
                        "error": "#ba1a1a",
                        "surface-container-high": "#e2e7ff",
                        "primary": "#006c49",
                        "on-tertiary-container": "#00367a",
                        "on-secondary-fixed-variant": "#005137",
                        "surface-container-highest": "#dae2fd",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#eef0ff",
                        "on-background": "#131b2e",
                        "outline": "#6c7a71",
                        "surface-bright": "#faf8ff",
                        "surface-container-low": "#f2f3ff",
                        "secondary-fixed": "#85f8c4",
                        "surface-variant": "#dae2fd",
                        "tertiary-fixed-dim": "#adc6ff",
                        "tertiary-container": "#71a1ff",
                        "surface-container-lowest": "#ffffff",
                        "surface-dim": "#d2d9f4",
                        "tertiary-fixed": "#d8e2ff",
                        "primary-fixed": "#6ffbbe",
                        "on-primary-fixed": "#002113",
                        "secondary-fixed-dim": "#68dba9",
                        "background": "#faf8ff",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#00714e",
                        "on-tertiary-fixed-variant": "#004395",
                        "on-error": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Sora", "sans-serif"],
                        "body": ["DM Sans", "sans-serif"],
                        "label": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        body { font-family: 'DM Sans', sans-serif; background-color: #faf8ff; }
        .font-sora { font-family: 'Sora', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(16, 185, 129, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#faf8ff] dark:bg-zinc-950 flex justify-between items-center px-6 h-16 w-full">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors duration-200 active:scale-95">
<span class="material-symbols-outlined text-emerald-600 dark:text-emerald-400">arrow_back</span>
</button>
<h1 class="font-sora font-bold text-lg text-emerald-600 dark:text-emerald-400">Registrasi</h1>
<div class="bg-secondary-container/30 px-3 py-1 rounded-full">
<span class="font-label text-xs font-bold text-on-secondary-container">1 dari 2</span>
</div>
</header>
<main class="pt-24 pb-12 px-6 max-w-md mx-auto">
<!-- Title & Subtitle -->
<div class="mb-10 text-left">
<h2 class="font-sora font-extrabold text-3xl tracking-tight text-[#111827] mb-2">Buat Akun Baru</h2>
<p class="text-on-surface-variant text-sm">Silakan lengkapi data diri Anda untuk memulai pengalaman internet terbaik.</p>
</div>
<!-- Form Container -->
<form class="space-y-6">
<!-- Full Name -->
<div class="space-y-2">
<label class="block font-sora font-semibold text-sm text-on-surface ml-1">Nama Lengkap</label>
<div class="relative group">
<input class="w-full h-14 px-4 bg-surface-container-highest border-none rounded-2xl focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline/60 text-on-surface font-body" placeholder="Masukkan nama sesuai KTP" type="text"/>
</div>
</div>
<!-- WhatsApp Number -->
<div class="space-y-2">
<label class="block font-sora font-semibold text-sm text-on-surface ml-1">No WhatsApp</label>
<div class="relative flex items-center">
<div class="absolute left-4 flex items-center gap-1 border-r border-outline-variant pr-3">
<span class="font-label text-sm text-on-surface-variant font-medium">+62</span>
</div>
<input class="w-full h-14 pl-20 pr-4 bg-surface-container-highest border-none rounded-2xl focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline/60 text-on-surface font-label" placeholder="812 3456 7890" type="tel"/>
</div>
</div>
<!-- Area/Address -->
<div class="space-y-2">
<label class="block font-sora font-semibold text-sm text-on-surface ml-1">Area / Alamat</label>
<div class="relative">
<input class="w-full h-14 pl-4 pr-12 bg-surface-container-highest border-none rounded-2xl focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline/60 text-on-surface font-body" placeholder="Cari area atau alamat Anda" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary">location_on</span>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="block font-sora font-semibold text-sm text-on-surface ml-1">Kata Sandi</label>
<div class="relative">
<input class="w-full h-14 pl-4 pr-12 bg-surface-container-highest border-none rounded-2xl focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline/60 text-on-surface font-label" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline">visibility</span>
</div>
<!-- Password Strength Meter -->
<div class="pt-2 px-1">
<div class="flex justify-between items-center mb-1">
<span class="font-label text-[10px] text-primary uppercase tracking-wider font-bold">Kekuatan Sandi: Kuat</span>
</div>
<div class="flex gap-1 h-1.5 w-full">
<div class="h-full flex-1 bg-primary-container rounded-full"></div>
<div class="h-full flex-1 bg-primary-container rounded-full"></div>
<div class="h-full flex-1 bg-primary-container rounded-full"></div>
<div class="h-full flex-1 bg-primary-container rounded-full"></div>
</div>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-2">
<label class="block font-sora font-semibold text-sm text-on-surface ml-1">Konfirmasi Sandi</label>
<div class="relative">
<input class="w-full h-14 pl-4 pr-12 bg-surface-container-highest border-none rounded-2xl focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline/60 text-on-surface font-label" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full h-14 bg-primary text-on-primary font-sora font-bold text-base rounded-2xl shadow-[0_8px_24px_-8px_rgba(16,185,129,0.5)] hover:shadow-[0_12px_32px_-8px_rgba(16,185,129,0.6)] active:scale-[0.98] transition-all duration-200" type="submit">
                    Daftar &amp; Kirim OTP
                </button>
</div>
</form>
<!-- Terms -->
<p class="mt-8 text-center text-xs text-on-surface-variant px-4 leading-relaxed">
            Dengan mendaftar, Anda menyetujui <span class="text-primary font-bold">Syarat &amp; Ketentuan</span> serta <span class="text-primary font-bold">Kebijakan Privasi</span> JBR Minpo.
        </p>
<!-- Login Link -->
<div class="mt-10 flex justify-center items-center gap-2">
<span class="text-sm text-on-surface-variant">Sudah punya akun?</span>
<button class="text-sm font-bold text-primary hover:underline">Masuk Sekarang</button>
</div>
</main>
<!-- Visual Decoration (Floating Ethereal Shapes) -->
<div class="fixed top-20 -right-20 w-64 h-64 bg-primary-container/10 blur-[80px] rounded-full -z-10"></div>
<div class="fixed bottom-20 -left-20 w-80 h-80 bg-tertiary-container/10 blur-[100px] rounded-full -z-10"></div>
<!-- Bottom Shell Exclusion: Login/Register screens typically suppress global navigation as per "Destination Rule" -->
</body></html>
